# Azahar Page-Flip 3D 专用构建工作流
#
# 用法：
# 1. Fork Azahar (https://github.com/azahar-emu/azahar)
# 2. 在 fork 根目录创建 patches/pageflip.patch（粘贴 azahar-pageflip.patch 内容）
# 3. 在 fork 根目录创建 .github/workflows/build-windows-pageflip.yml（粘贴本文件）
# 4. 进 Actions 页面 → Run workflow
# 5. 等 1-3 小时下载 azahar-pageflip-windows.zip

name: Build Windows (Page-Flip 3D)

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msvc:
    name: Build Windows MSVC (with Page-Flip patch)
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      # 1. 拉取源码（含子模块）
      - name: Checkout Azahar source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 缓存编译结果（加速后续构建）
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.ccache
          key: ${{ runner.os }}-pageflip-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pageflip-

      # 3. 设置 MSVC 编译环境
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 4. 安装额外工具
      - name: Install extra tools
        shell: cmd
        run: |
          choco install -y ccache ninja ptime wget 7zip

      # 5. 安装 Qt6
      # 注：Qt 6.7+ 拆分 'qtbase' 为子模块，需改用 6.5.x 才能用 qtbase 模块名
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qtmultimedia'
          cache: true

      # 6. 安装 Vulkan SDK
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $vulkanInstaller = "$env:TEMP\vulkan.exe"
          wget https://sdk.lunarg.com/sdk/download/1.3.290.0/windows/VulkanSDK-1.3.290.0-Installer.exe -OutFile $vulkanInstaller
          $proc = Start-Process -FilePath $vulkanInstaller -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }

      # 7. ★ 应用 Page-Flip 3D patch ★
      - name: Apply Page-Flip 3D patch
        shell: bash
        run: |
          if [ -f patches/pageflip.patch ]; then
            echo "Applying pageflip.patch..."
            git apply --check patches/pageflip.patch
            git apply patches/pageflip.patch
            echo "Patch applied successfully"
          else
            echo "ERROR: patches/pageflip.patch not found!"
            echo "Please put the patch file at patches/pageflip.patch"
            exit 1
          fi

      # 8. 关闭行尾自动转换
      - name: Disable line ending translation
        shell: bash
        run: git config --global core.autocrlf input

      # 9. CMake 配置
      # jurplel/install-qt-action 会自动设置 Qt6_DIR 环境变量
      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja ^
             -DCMAKE_BUILD_TYPE=Release ^
             -DENABLE_DISCORD_RPC=ON ^
             -DENABLE_QT=ON ^
             -DENABLE_SDL2=OFF
          if errorlevel 1 exit /b %errorlevel%

      # 10. 编译
      - name: Build (this may take 1-3 hours)
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release --parallel
          if errorlevel 1 exit /b %errorlevel%

      # 11. Strip 二进制
      - name: Strip binaries
        shell: bash
        run: |
          cd build/bundle
          for f in *.exe; do
            strip -s "$f" 2>/dev/null || true
          done
          ls -lh

      # 12. 打包成 zip
      - name: Create release ZIP
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $zipName = "azahar-pageflip-${sha}-${timestamp}.zip"
          Compress-Archive -Path build/bundle/* -DestinationPath "$zipName" -Force
          echo "ZIP_FILE=$zipName" >> $env:GITHUB_ENV
          Get-Item $zipName | Format-Table Name, Length

      # 13. 生成 SHA256 校验和
      - name: Generate checksums
        shell: pwsh
        run: |
          $hash = Get-FileHash "$env:ZIP_FILE" -Algorithm SHA256
          "$($hash.Hash)  $($env:ZIP_FILE)" | Out-File -FilePath "$env:ZIP_FILE.sha256" -Encoding ASCII
          Get-Content "$env:ZIP_FILE.sha256"

      # 14. 上传构建产物
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: azahar-pageflip-windows
          path: |
            ${{ env.ZIP_FILE }}
            ${{ env.ZIP_FILE }}.sha256
          if-no-files-found: error
          retention-days: 30

      # 15. 如果是 tag，自动创建 Release
      - name: Create Release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_FILE }}
            ${{ env.ZIP_FILE }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
